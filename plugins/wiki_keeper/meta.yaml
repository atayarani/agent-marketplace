# Canonical source for this plugin. Adapters (bin/adapters/<harness>.sh) read
# this to generate each harness's manifest. Never hand-author generated manifests.
name: wiki_keeper
version: 0.2.1
description: |-
  Discipline for LLM-maintained personal wikis. Ingest sources, query the wiki, file durable insights back, run health audits, and enrich book/movie lists from public APIs.
# Installs on all harnesses (default). Has agents/ -> subagents auto-detected.
